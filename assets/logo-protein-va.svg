  </g>
  <path d="M113 62H149L137 93H156L130 129H148L128 167H96L126 120H108L133 87H119L113 62Z" fill="#D6FB67" opacity="0.72"/>

  <text x="206" y="104" fill="#FFFFFF" font-family="Lexend, Manrope, sans-serif" font-size="66" font-weight="900" letter-spacing="1.5">PROTEIN</text>
  <text x="207" y="170" fill="#D7FC69" font-family="Lexend, Manrope, sans-serif" font-size="66" font-weight="900" letter-spacing="4">VA</text>
  <rect x="206" y="183" width="390" height="5" fill="#D7FC69" opacity="0.8"/>

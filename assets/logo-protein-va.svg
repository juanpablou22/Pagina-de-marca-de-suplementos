<svg width="640" height="220" viewBox="0 0 640 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Logo PROTEIN VA</title>
  <desc id="desc">Logotipo con emblema geometrico y palabra PROTEIN VA.</desc>
  <defs>
    <linearGradient id="neon" x1="42" y1="32" x2="156" y2="186" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F2FF9B"/>
      <stop offset="1" stop-color="#B8E918"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2F2F2F"/>
      <stop offset="1" stop-color="#111111"/>
    </linearGradient>
    <filter id="glow" x="0" y="0" width="220" height="220" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
